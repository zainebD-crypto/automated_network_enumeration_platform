<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password — ANCScan</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">ANC<span>Scan</span></div>
    <div class="login-sub">Choose a new password</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-container">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="field">
        <label>New Password <span class="dim">(min. 8 characters)</span></label>
        <input type="password" name="password" autofocus required minlength="8">
      </div>
      <div class="field">
        <label>Confirm New Password</label>
        <input type="password" name="confirm" required minlength="8">
      </div>
      <button type="submit" class="btn-primary full-width">Set New Password</button>
    </form>
  </div>
</body>
</html>
