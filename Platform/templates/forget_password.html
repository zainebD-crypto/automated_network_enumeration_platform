<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password — ANCScan</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">ANC<span>Scan</span></div>
    <div class="login-sub">Reset your password</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-container">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="field">
        <label>Account Email</label>
        <input type="email" name="email" autofocus required>
      </div>
      <button type="submit" class="btn-primary full-width">Send Reset Link</button>
    </form>
    <div style="text-align:center;margin-top:16px;">
      <a href="{{ url_for('auth.login') }}" style="font-size:12.5px;color:var(--accent);text-decoration:none;">‹ Back to log in</a>
    </div>
  </div>
</body>
</html>
